# =============================================================
# site.yml  –  Main playbook
# Groups are auto-created by dynamic inventory from the "Role"
# tag you set in Terraform:
#   role_prometheus   → server with Role = prometheus
#   role_node_exporter → servers with Role = node_exporter
#   role_docker        → server with Role = docker
# =============================================================
 
- name: Configure Prometheus Server
  hosts: _prometheus_server
  remote_user: ec2-user
  become: true
  roles:
    - prometheus

- name: Configure Node Exporter
  hosts: _node_exporter
  become: true
  roles:
    - node_exporter
 
